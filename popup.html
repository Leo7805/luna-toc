<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChatTOC</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <!-- <h1>ChatTOC</h1> -->
      <section aria-labelledby="tips-heading">
        <h2 id="tips-heading">Tips</h2>
        <ul>
          <li>
            Type <kbd>#</kbd> or <kbd>//</kbd> to insert a saved prompt. Add
            a space first when typing mid-message.
          </li>
          <li>
            <strong>Right-click</strong> a prompt to save it to MyPrompts.
          </li>
        </ul>

        <aside class="note" aria-label="Navigation note">
          <svg aria-hidden="true" viewBox="0 0 16 16" focusable="false">
            <circle cx="8" cy="8" r="6.25" />
            <path d="M8 7v4M8 5.1v.1" />
          </svg>
          <p>
            <strong>Note:</strong> If the TOC is missing items or becomes out
            of sync, refresh the page.
          </p>
        </aside>
      </section>
    </main>
  </body>
</html>
